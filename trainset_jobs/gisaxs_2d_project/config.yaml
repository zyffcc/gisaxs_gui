    yoneda_center_fraction_max: 0.72
    yoneda_width_fraction_min: 0.02
    yoneda_width_fraction_max: 0.08
    yoneda_center_hole_min: 0.4
    yoneda_center_hole_max: 0.95
    wedge_amplitude_min: 0.05
    wedge_amplitude_max: 0.4
