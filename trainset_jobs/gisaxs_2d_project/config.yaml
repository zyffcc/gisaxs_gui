simulation:
  engine: bornagain_yuxin
  image_size:
  - 256
  - 256
  resolution_sigma_phi_deg: 0.01
  resolution_sigma_alpha_deg: 0.01
parameters:
  radius_nm:
    minimum: 1.0
    maximum: 15.0
    distribution: uniform
    source: form_factor
  height_nm:
    minimum: 1.0
    maximum: 20.0
    distribution: uniform
    source: form_factor
  D_nm:
    minimum: 3.0
    maximum: 50.0
    distribution: uniform
    source: structure_factor
  sigma_D_ratio:
    minimum: 0.05
    maximum: 0.2
    distribution: uniform
    source: structure_factor
sample:
  surface_density_per_nm2: 0.01
  particles:
  - plugin: spherical_segment
    material: Copper
    enabled: true
