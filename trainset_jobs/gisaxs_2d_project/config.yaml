  pixels_y: 1679
  pixel_size_x_mm: 0.172
  pixel_size_y_mm: 0.172
  distance_mm: 3230.0
  beam_center_x_px: 804.0
  beam_center_y_px: 305.0
roi:
  x: 385
  y: 876
  width: 410
  height: 435
mask:
  mode: fixed
  mask_value: -1.0
  threshold:
    enabled: true
    minimum: 0.0
    maximum: 415940.95378
    auto_reference_upper: true
    upper_quantile: 99.999
  fixed_shapes: []
  random:
    vertical_bars: 2
    horizontal_bars: 1
    bar_width_min: 2
    bar_width_max: 6
    circles: 1
    circle_radius_min: 4
    circle_radius_max: 12
