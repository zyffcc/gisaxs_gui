      radius_nm:
        minimum: 1.0
        maximum: 15.0
        distribution: uniform
      height_nm:
        minimum: 1.0
        maximum: 20.0
        distribution: uniform
  mixture:
    mode: gaussian_mixture
    components: 5
    sigma_fraction_min: 0.01
    sigma_fraction_max: 0.3
    random_weights: true
  layers:
  - enabled: true
    material: Copper
    thickness_nm:
      minimum: 20.0
      maximum: 20.0
    roughness_nm:
      minimum: 0.0
      maximum: 0.0
  - enabled: true
    material: Polymer
    thickness_nm:
      minimum: 50.0
      maximum: 50.0
    roughness_nm:
      minimum: 0.0
      maximum: 0.0
  substrate:
    material: Silicon
    roughness_nm: 0.0
  interference:
    plugin: paracrystal
    enabled: true
    parameters:
      D_nm:
        minimum: 3.0
        maximum: 50.0
        distribution: uniform
      sigma_D_ratio:
        minimum: 0.05
        maximum: 0.2
        distribution: uniform
  constraints:
    segment_height_le_2r: true
    interparticle_spacing_gt_2r: true
preprocessing:
  steps:
  - plugin: physical_background
    enabled: false
    target_fraction_min: 0.05
    target_fraction_max: 0.3
    constant_fraction_min: 0.0
    constant_fraction_max: 0.03
    specular_amplitude_min: 0.2
