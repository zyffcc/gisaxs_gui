id: Yuxin_CuPolymer_FF_256
name: "Copper on Silicon (DESY P03) - Sputter"
framework: tensorflow
version: "2.x"
model:
  format: keras
  # model_path: 允许为空，首次使用需要选择
  model_path: 'C:\Users\zhaiyufe\Downloads\yuxin_saved_model\yuxin_saved_model'
preprocess:
  entry: preprocess:run
  # Keep consistent with FF_test.ipynb experimental preprocessing and
  # FF_training.py clean-input log/mask behavior.
  steps:
    - crop
    - resize
    - experiment_mask
    - log_and_normalize
    - mask
  params:
    crop:
      # FF_test uses CROP_PARAMS=[670,1100,300,530] and slicing:
      # cropped_raw = raw_data[up:-down, right:-left]
      # This maps to crop(left=530, up=1100, down=300, right=670).
      left: 530
      up: 1100
      down: 300
      right: 670
    resize:
      shape: [256, 256]
      method: nearest
    experiment_mask:
      apply: true
      gap_value_threshold: -1e-5
      row_gap_fraction: 0.8
      col_gap_fraction: 0.8
      bad_sigma: 1e6
      median_size: 5
      dilate_iter: 1
      # Optional manual edge mask after resize. For example, down: 20 masks
      # the bottom 20 pixels before log normalization.
      crop_mask:
        up: 0
        down: 0
        left: 0
        right: 0
      beamstops:
        - center: [0, 270]
          radius: 30
        - center: [246, 256]
          radius: 20
    log_and_normalize:
      eps: 1e-8
    mask: 
      apply: true
      path: "assets/mask.npy"
      mask_value: -1
io:
  input_type: "cbf"
  stack_axis: 0
  input_shape: [1, 256, 256, 1]
outputs:
  - name: "hr distribution"
    shape: [30, 30]

  
